# Coacker Configuration
# Copy this file to config.toml and edit as needed.

[backend]
type = "ag"                               # Backend type

[backend.ag]
endpointUrl = "http://localhost:9222"      # CDP debug endpoint
timeout = 30000                           # Connection timeout (ms)
humanize = true                           # Simulate human typing rhythm
windowTitle = "Coacker"                   # Window title to connect to

[brain]
type = "audit"                            # Brain type

[brain.audit]
maxGapRounds = 2                          # Gap Analyzer iteration limit (0 = disable)
maxSubTasks = 20                          # Max sub-tasks per round
projectRoot = "."                         # Project root to audit
entryFile = "packages/brain/src/index.ts" # Entry file for analysis
userIntent = "Comprehensive code review"  # Default review intent

[player]
taskTimeout = 300                         # Per-task timeout (seconds)
skillsDir = "./skills"                    # Skills directory

[knowledge]
storeDir = "./knowledge"                  # Knowledge base storage
maxEntrySize = 50000                      # Max chars per knowledge entry
